[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# VITE_API_URL and VITE_SOCKET_URL must be set in Netlify's Site configuration
# > Environment variables, pointing at your deployed Render backend, e.g.:
#   VITE_API_URL=https://stadium-os-backend.onrender.com/api
#   VITE_SOCKET_URL=https://stadium-os-backend.onrender.com
# The frontend connects to the backend directly (not proxied through Netlify)
# since Netlify's redirect proxy does not reliably support WebSocket upgrades
# for Socket.IO across origins.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # connect-src covers both the REST API and the Socket.IO websocket
    # upgrade, which both run on the same Render origin (see VITE_API_URL /
    # VITE_SOCKET_URL above). img-src allows Cloudinary-hosted avatars/uploads.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; font-src 'self' data:; connect-src 'self' https://stadiumos-ai-rfcy.onrender.com wss://stadiumos-ai-rfcy.onrender.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
